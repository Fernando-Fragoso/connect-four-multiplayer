<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Connect Four Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body {
            font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center;
            background-color: #f0f2f5; min-height: 100vh; width: 100%; overflow-x: hidden; padding-bottom: 30px;
        }
        #lobby-container {
            width: 100%; max-width: 450px; background: white; padding: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-top: 40px;
        }
        .form-section { margin: 15px 0; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        input { padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px; width: 90%; margin-bottom: 10px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; background-color: #0051ba; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; }
        #games-list { margin-top: 15px; max-height: 180px; overflow-y: auto; padding: 5px; }
        .game-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 5px; font-size: 14px; }
        .game-item button { width: auto; padding: 6px 12px; font-size: 13px; }
        
        #game-view { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; }
        
        /* UNIFIED STICKY HUD CONTAINER: Locked to top to keep everything completely in sight */
        #sticky-hud {
            position: -webkit-sticky; position: sticky; top: 0; z-index: 100;
            width: 100%; background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;
        }
        #scoreboard { display: flex; justify-content: space-around; font-size: 15px; font-weight: bold; padding: 12px 10px 6px 10px; }
        #p1-score-box { color: #ff4136; text-align: center; flex: 1; padding: 4px; border-radius: 5px; transition: all 0.3s ease; }
        #p2-score-box { color: #dcb100; text-align: center; flex: 1; padding: 4px; border-radius: 5px; transition: all 0.3s ease; }
        .winner-crown { background-color: #d4edda; border: 2px dashed #28a745; transform: scale(1.03); }
        
        #status { font-size: 14px; margin: 5px auto 10px auto; font-weight: bold; text-align: center; min-height: 24px; width: 92%; color: #333; padding: 5px; }
        .flash-banner { animation: flashBg 0.6s infinite alternate; font-size: 16px !important; border-radius: 5px; }
        @keyframes flashBg { 0% { background-color: #fff3cd; color: #856404; } 100% { background-color: #dc3545; color: #ffffff; } }

        #game-container-layout { display: flex; width: 100%; max-width: 500px; padding: 10px 5px; margin-top: 5px; }
        #row-labels-bar { display: flex; flex-direction: column; justify-content: space-around; width: 25px; padding: 45px 0 15px 0; text-align: center; font-weight: bold; font-size: 13px; }
        #board-and-col-wrapper { display: flex; flex-direction: column; flex: 1; }
        #col-labels-bar { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 10px 6px 10px; text-align: center; font-weight: bold; font-size: 13px; }
        
        .grid-label { color: #a0a0a0; transition: color 0.2s ease, font-weight 0.2s ease; }
        .grid-label.highlighted-last { color: #000000 !important; font-size: 15px; font-weight: 900; }

        #board {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
            background-color: #0051ba; padding: 10px; border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); width: 100%; aspect-ratio: 7 / 6;
        }
        .cell {
            background-color: #ffffff; border-radius: 50%; width: 100%; height: 100%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15); transition: opacity 0.4s ease;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .cell.player1 { background-color: #ff4136; }
        .cell.player2 { background-color: #ffdc00; }
        .cell.dimmed { opacity: 0.5; }
        
        #reset { margin-top: 15px; padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; background-color: #333; color: white; border-radius: 5px; width: 60%; max-width: 200px; }
    </style>
</head>
<body>
    <div id="lobby-container">
        <h2>Connect Four Matchmaker</h2>
        <div class="form-section"><input type="text" id="usernameInput" placeholder="Enter Your Nickname" maxlength="12"></div>
        <div class="form-section">
            <h3>Create a New Game</h3>
            <input type="text" id="gameNameInput" placeholder="Game Room Name"><br>
            <input type="password" id="gamePassInput" placeholder="Password (Optional)">
            <button onclick="createNewGame()">Create & Join</button>
        </div>
        <div class="form-section"><h3>Available Open Games</h3><div id="games-list">No active game rooms found.</div></div>
    </div>

    <div id="game-view">
        <div id="sticky-hud">
            <div id="scoreboard">
                <div id="p1-score-box"><span id="lbl-p1">Player 1</span><br>Score: <span id="score-p1">0</span></div>
                <div id="p2-score-box"><span id="lbl-p2">Player 2</span><br>Score: <span id="score-p2">0</span></div>
            </div>
            <div id="status">Connecting...</div>
        </div>

        <div id="game-container-layout">
            <div id="row-labels-bar">
                <div class="grid-label" id="row-label-0">1</div>
                <div class="grid-label" id="row-label-1">2</div>
                <div class="grid-label" id="row-label-2">3</div>
                <div class="grid-label" id="row-label-3">4</div>
                <div class="grid-label" id="row-label-4">5</div>
                <div class="grid-label" id="row-label-5">6</div>
            </div>
            <div id="board-and-col-wrapper">
                <div id="col-labels-bar">
                    <div class="grid-label" id="col-label-0">A</div>
                    <div class="grid-label" id="col-label-1">B</div>
                    <div class="grid-label" id="col-label-2">C</div>
                    <div class="grid-label" id="col-label-3">D</div>
                    <div class="grid-label" id="col-label-4">E</div>
                    <div class="grid-label" id="col-label-5">F</div>
                    <div class="grid-label" id="col-label-6">G</div>
                </div>
                <div id="board"></div>
            </div>
        </div>
        <button id="reset" onclick="resetGame()">Restart Game</button>
    </div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const ROWS = 6; const COLS = 7;
    let board = []; let currentPlayer = 1; let gameActive = false;
    let myPlayerNumber = 0; let myName = ""; let p1Name = "Waiting..."; let p2Name = "Waiting...";

    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');

    socket.on('gameListUpdate', (games) => {
        const listDiv = document.getElementById('games-list');
        if (games.length === 0) { listDiv.innerHTML = "No active game rooms found."; return; }
        listDiv.innerHTML = "";
        games.forEach(g => {
            const item = document.createElement('div'); item.classList.add('game-item');
            let txt = g.hasP2 ? "Spectate" : "Join & Play"; if (g.hasPassword) txt += " 🔒";
            item.innerHTML = `<span><strong>${g.name}</strong> (${g.specCount} watching)</span>
                             <button onclick="joinExistingGame('${g.id}', ${g.hasPassword})">${txt}</button>`;
            listDiv.appendChild(item);
        });
    });

    function getUsername() {
        const name = document.getElementById('usernameInput').value.trim();
        if (!name) { alert("Please enter a nickname first!"); return null; }
        myName = name; return name;
    }
    function createNewGame() {
        const name = getUsername(); if (!name) return;
        const gameName = document.getElementById('gameNameInput').value.trim();
        const password = document.getElementById('gamePassInput').value;
        if (!gameName) { alert("Please supply a Game Room Name!"); return; }
        socket.emit('createGame', { name, gameName, password });
    }
    function joinExistingGame(gameId, hasPassword) {
        const name = getUsername(); if (!name) return;
        let password = ""; if (hasPassword) { password = prompt("Enter password:"); if (password === null) return; }
        socket.emit('joinGame', { gameId, name, password });
    }

    socket.on('joinSuccess', (data) => {
        myPlayerNumber = data.playerNum;
        p1Name = data.p1Name || "Waiting..."; p2Name = data.p2Name || "Waiting...";
        document.getElementById('lobby-container').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        initGame();
    });

    socket.on('joinFailure', (msg) => alert(msg));

    socket.on('gameStateUpdate', (data) => {
        p1Name = data.p1Name || "Waiting..."; p2Name = data.p2Name || "Waiting...";
        document.getElementById('lbl-p1').innerText = p1Name; document.getElementById('lbl-p2').innerText = p2Name;
        document.getElementById('score-p1').innerText = data.p1Score; document.getElementById('score-p2').innerText = data.p2Score;
        gameActive = data.gameActive; currentPlayer = data.currentPlayer; board = data.board;
        
        statusElement.classList.remove('flash-banner');
        document.getElementById('p1-score-box').classList.remove('winner-crown');
        document.getElementById('p2-score-box').classList.remove('winner-crown');

        for (let r = 0; r < ROWS; r++) document.getElementById(`row-label-${r}`).classList.remove('highlighted-last');
        for (let c = 0; c < COLS; c++) document.getElementById(`col-label-${c}`).classList.remove('highlighted-last');

        if (data.lastPlayedRow !== null && data.lastPlayedCol !== null) {
            document.getElementById(`row-label-${data.lastPlayedRow}`).classList.add('highlighted-last');
            document.getElementById(`col-label-${data.lastPlayedCol}`).classList.add('highlighted-last');
        }

        renderBoardUI(data.winningCells); 
        if (data.winnerSide) {
            const winBoxId = data.winnerSide === 1 ? 'p1-score-box' : 'p2-score-box';
            document.getElementById(winBoxId).classList.add('winner-crown');
        } else {
            updateStatusText();
        }
    });

    function initGame() {
        board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        renderBoardUI(null);
    }

    function renderBoardUI(winningCells) {
        boardElement.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div'); cell.classList.add('cell');
                if (board[r][c] === 1) cell.classList.add('player1');
                if (board[r][c] === 2) cell.classList.add('player2');
                
                if (winningCells && board[r][c] !== 0) {
                    const isWinningCell = winningCells.some(coords => coords.r === r && coords.c === c);
                    if (!isWinningCell) cell.classList.add('dimmed');
                }
                if (myPlayerNumber !== 0 && !winningCells) {
                    // FIXED: Clean native click handler with pointer adjustments to allow fluid taps across devices
                    cell.onclick = (e) => { e.preventDefault(); handleCellClick(c); };
                }
                boardElement.appendChild(cell);
            }
        }
    }

    function updateStatusText() {
        if (!gameActive) return;
        const activeLabel = currentPlayer === 1 ? p1Name : p2Name;
        if (myPlayerNumber === 0) {
            statusElement.innerText = `Spectating: Turn belongs to ${activeLabel}`;
        } else if (currentPlayer === myPlayerNumber) {
            statusElement.innerText = `Your Turn! Tap a column.`;
        } else {
            statusElement.innerText = `Waiting for ${activeLabel}...`;
        }
    }

    function handleCellClick(col) {
        if (!gameActive || currentPlayer !== myPlayerNumber) return;
        socket.emit('playerActionMove', { col });
    }

    socket.on('gameFinished', (data) => {
        gameActive = false; const winner = data.winner === 1 ? p1Name : p2Name;
        if (data.type === 'win') {
            statusElement.innerText = `🎉 MATCH OVER: ${winner.toUpperCase()} WINS! 🎉`;
            statusElement.classList.add('flash-banner');
        } else { statusElement.innerText = "It's a Draw! 🤝"; }
    });

    socket.on('opponentDisconnected', (data) => { statusElement.innerText = data.msg; gameActive = false; });
    socket.on('playerReconnected', (data) => alert(data.msg));
    socket.on('forfeitMessage', (data) => alert(data.msg));
    socket.on('roomDestroyed', () => { alert("The 60s grace period expired. Room closed."); window.location.reload(); });

    function resetGame() {
        if (myPlayerNumber === 0) return;
        const msg = gameActive 
            ? "An ongoing match is running! Resetting now will count as a FORFEIT and give your opponent a point. Do you want to proceed?"
            : "Do you want to reset the board for a new round?";
        if (confirm(msg)) socket.emit('requestMatchReset');
    }
</script>
</body>
</html>
